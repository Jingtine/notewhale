services:
  - type: web
    name: notewhale-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NOTEWHALE_SECRET_KEY
        generateValue: true
      - key: NOTEWHALE_TOKEN_EXPIRE_DAYS
        value: "14"
      - key: NOTEWHALE_VISION_API_URL
        value: https://open.bigmodel.cn/api/paas/v4/chat/completions
      - key: NOTEWHALE_VISION_MODEL
        value: glm-4v-flash
      - key: NOTEWHALE_TEXT_API_URL
        value: https://open.bigmodel.cn/api/paas/v4/chat/completions
      - key: NOTEWHALE_TEXT_MODEL
        value: glm-4-flash-250414
      - key: NOTEWHALE_VISION_API_KEY
        sync: false
      - key: NOTEWHALE_TEXT_API_KEY
        sync: false
